<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>

</head>
<body class="bg-white dark:bg-slate-900 transition-colors">
        <header class="relative w-full text-center py-8 bg-white border-b-4 border-teal-200 dark:bg-slate-800 dark:border-teal-500">
        <h1 class="text-4xl font-bold text-gray-800 dark:text-white">Task Manager</h1>
        <p class="text-gray-500 dark:text-gray-400">Organiza tu día a día</p>
        <button id="theme-toggle" class="absolute top-4 right-4 p-2 rounded-lg text-gray-800 dark:text-gray-100 bg-gray-200 dark:bg-gray-700">
            Cambiar modo
        </button>
    </header>
    <div class="container mx-auto mt-8 p-4 flex flex-col md:flex-row gap-8">
        <aside class="w-full md:w-1/4">
            <nav class="bg-white dark:bg-slate-800 p-4 rounded-lg shadow-md">
                <h2 class="text-xl font-bold mb-4 text-gray-800 dark:text-gray-100">Prioridad</h2>
                <ul id="navigation-elements" class="space-y-2">
                    <li><a href="#" class="block p-2 rounded-md">Todas</a></li>
                    <li><a href="#" class="block p-2 rounded-md">Alta</a></li>
                    <li><a href="#" class="block p-2 rounded-md">Media</a></li>
                    <li><a href="#" class="block p-2 rounded-md">Baja</a></li>
                </ul>
            </nav>
        </aside>
        <main class="w-full md:w-3/4">
            <div class="bg-white dark:bg-slate-800 p-6 rounded-lg shadow-md">
                <section class="mb-6">
                    <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100">To do:</h2>
                </section>
                <section id="task-container" class="mb-6">
                    <!-- Tareas generadas por JS -->
                </section>
                <section>
                    <form id="add-task-form" class="flex flex-col sm:flex-row gap-3">
                        <input type="text" id="new-task" name="new-task" placeholder="Escribe tu tarea aquí" class="grow p-2 border rounded-md bg-gray-50 dark:bg-slate-700 dark:text-white dark:border-slate-600 focus:ring-2 focus:ring-teal-500 focus:outline-none">
                        <select id="priority" name="priority" class="p-2 border rounded-md bg-gray-50 dark:bg-slate-700 dark:text-white dark:border-slate-600 focus:ring-2 focus:ring-teal-500 focus:outline-none">
                            <option value="alta">Alta</option>
                            <option value="media">Media</option>
                            <option value="baja">Baja</option>
                        </select>
                        <button type="submit" class="bg-teal-500 text-white px-4 py-2 rounded-md font-semibold hover:bg-teal-600 transition-colors">Agregar</button>
                    </form>
                </section>
            </div>
        </main>
    </div>
    <script type="module" src="./src/main.js"></script>
</body>
</html>
