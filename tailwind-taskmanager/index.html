<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
</head>

<body class="bg-white dark:bg-slate-900 transition-colors min-h-screen flex flex-col">
    <header
        class="relative w-full text-center py-8 bg-white border-b-4 border-teal-200 dark:bg-slate-800 dark:border-teal-500">
        <h1 class="text-4xl font-bold text-gray-800 dark:text-white">Task Manager</h1>
        <p class="text-gray-500 dark:text-gray-400">Organiza tu día a día</p>
        <button id="theme-toggle"
            class="absolute top-4 right-4 p-2 rounded-lg text-gray-800 dark:text-gray-100 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition-all shadow-sm">
            Cambiar modo
        </button>
    </header>

    <div class="flex-grow flex justify-center items-start pt-6 pb-20">
        <div class="container mx-auto p-4 flex flex-col md:flex-row justify-center items-center md:items-start gap-12 md:gap-0">

            <aside class="w-full md:w-auto z-30">
                <nav class="flex flex-col items-center md:items-end md:mt-24">
                    <h2 class="text-[0.7rem] font-bold mb-3 text-gray-400 uppercase tracking-widest text-center md:text-right md:pr-6">
                        Prioridad</h2>
                    <ul id="navigation-elements" class="flex flex-row md:flex-col items-center md:items-end gap-2 md:gap-0">
                        <li class="md:mb-3"><a href="#" class="nav-tab">Todas</a></li>
                        <li class="md:mb-3"><a href="#" class="nav-tab">Alta</a></li>
                        <li class="md:mb-3"><a href="#" class="nav-tab">Media</a></li>
                        <li class="md:mb-3"><a href="#" class="nav-tab">Baja</a></li>
                    </ul>
                </nav>
            </aside>

            <main class="w-full max-w-2xl mt-12 md:mt-16">
                <div class="relative bg-white dark:bg-slate-800 min-h-[600px] shadow-2xl rounded-r-2xl border-l-[15px] border-teal-200 dark:border-teal-600 p-8 pt-16 pl-20 
                    bg-[linear-gradient(90deg,transparent_49px,#ab4442_50px,#ab4442_51px,transparent_52px),linear-gradient(rgba(0,0,0,0.05)_0.1rem,transparent_0.1rem)] 
                    bg-[length:100%_100%,100%_1.5rem]">

                    <div class="absolute -top-8 left-12 right-10 h-12 z-20 
                        bg-[repeating-linear-gradient(to_right,transparent_0,transparent_15px,#a68a56_15px,#e0d1b3_17px,#a68a56_19px,transparent_19px,transparent_23px,#a68a56_23px,#e0d1b3_25px,#a68a56_27px)] 
                        bg-[length:40px_100%] pointer-events-none">
                    </div>

                    <div class="absolute top-2 left-12 right-10 h-4 bg-[repeating-linear-gradient(to_right,transparent_0,transparent_16px,#333_16px,#333_20px,transparent_20px,transparent_24px,#333_24px,#333_28px)] bg-[length:40px_100%] opacity-15 z-10">
                    </div>

                    <section class="mb-6">
                        <h2 class="text-3xl font-bold text-gray-700 dark:text-teal-400 font-serif italic">To do:</h2>
                    </section>

                    <ul id="task-container" class="space-y-0 min-h-[350px]"></ul>

                    <section class="mt-10 pt-6 border-t border-dashed border-gray-300 dark:border-slate-600">
                        <form id="add-task-form" class="flex flex-col sm:flex-row gap-3">
                            <input type="text" id="new-task" placeholder="Escribe tu tarea aquí"
                                class="grow bg-transparent border-b-2 border-teal-100 hover:border-teal-500 focus:border-teal-500 focus:outline-none py-1 px-2 dark:text-white transition-colors">
                            <select id="priority"
                                class="bg-gray-50 dark:bg-slate-700 dark:text-white rounded p-1 text-sm outline-none hover:bg-gray-200 dark:hover:bg-slate-600 transition-all cursor-pointer shadow-sm hover:shadow-md">
                                <option value="alta">Alta</option>
                                <option value="media">Media</option>
                                <option value="baja">Baja</option>
                            </select>
                            <button type="submit"
                                class="bg-teal-500 text-white px-4 py-1 rounded shadow-md hover:bg-teal-600 transition-all active:scale-95 text-sm font-bold uppercase">
                                Agregar
                            </button>
                        </form>
                    </section>
                </div>
            </main>
        </div>
    </div>
    <script type="module" src="./src/main.js"></script>
</body>

</html>
