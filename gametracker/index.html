<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Tracker</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/style/style.css">
</head>
<body>
    <header>Game Tracker</header>

    <div class="games-container">
        <aside>
            <h2 class="menu-title">Menu</h2>
            <nav>
                <ul>
                    <li> <a href="index.html" class="active">Jugando</a> </li>
                    <li> <a href="pendiente.html">Pendiente</a> </li>
                    <li> <a href="wishlist.html">Wishlist</a> </li>
                </ul>
            </nav>
        </aside>
        <main>
            <section class="game-list">
                <article class="game-card">
                    <input type="checkbox" class="status-check">
                    <div class="card-image">
                        <img src="images/BG3.png" alt="Baldur's Gate 3 cover">
                    </div>
                    <div class="card-content">
                        <h3>Baldur's Gate 3</h3>
                        <span class="category">Aventura, Rol, Estrategia</span>
                        <span class="high-priority">Prioridad alta</span>
                    </div>
                </article>

                <article class="game-card">
                    <input type="checkbox" class="status-check" checked>
                    <div class="card-image">
                        <img src="images/bindingofisac.ico" alt="The Binding of Isaac: Rebirth cover">
                    </div>
                    <div class="card-content">
                        <h3>The Binding of Isaac: Rebirth</h3>
                        <span class="category">Acción</span>
                        <span class="high-priority">Prioridad alta</span>
                    </div>
                </article>

                <article class="game-card">
                    <input type="checkbox" class="status-check">
                    <div class="card-image">
                        <img src="images/daysgone.png" alt="Days Gone cover">
                    </div>
                    <div class="card-content">
                        <h3>Days Gone</h3>
                        <span class="category">Acción, Aventura</span>
                        <span class="medium-priority">Prioridad media</span>
                    </div>
                </article>
            </section>
        </main>
    </div>
    
</body>
</html>
